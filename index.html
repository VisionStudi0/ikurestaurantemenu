<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Interactivo | IKU</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div>
                <p class="overline">BIENVENIDO A</p>
                <h1>IKU</h1>
                <p>Restaurante Bar</p>
            </div>
            <div class="info-box">
                <p><strong>Pueblo Bello, Cesar</strong></p>
                <p class="tagline">★ Sabor ancestral ★</p>
            </div>
        </header>

        <main class="menu-content">
            <nav class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'diario')">Menú del Día</button>
                <button class="tab-btn" onclick="switchTab(event, 'rapida')">Comidas Rápidas</button>
                <button class="tab-btn" onclick="switchTab(event, 'varios')">Varios</button>
            </nav>

            <div id="loader" class="loader">Cargando menú...</div>
            
            <section id="diario" class="menu-section active"></section>
            <section id="rapida" class="menu-section"></section>
            <section id="varios" class="menu-section"></section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
