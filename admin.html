<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #0f1115; --accent: #ffcc00; --bg: #f4f7f6; --white: #ffffff; --danger: #ff4444; --success: #28a745; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        #login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: var(--white); padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #admin-panel { display: none; width: 100%; height: 100vh; flex-direction: row; }
        .sidebar { width: 240px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #a0a0a0; transition: 0.3s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #1a1d23; color: white; border-left-color: var(--accent); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 30px; scroll-behavior: smooth; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Acordeón / Colapsables */
        .admin-group { margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
        .admin-group-header { 
            background: #fff; padding: 15px 20px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            user-select: none; transition: 0.2s;
        }
        .admin-group-header:hover { background: #fafafa; }
        .admin-group-header h4 { font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .admin-group-content { max-height: 1000px; transition: max-height 0.4s ease-in-out; background: white; }
        .admin-group.collapsed .admin-group-content { max-height: 0; overflow: hidden; }
        .chevron { transition: 0.3s; font-size: 0.7rem; color: #ccc; }
        .admin-group.collapsed .chevron { transform: rotate(-90deg); }

        .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-top: 1px solid #f9f9f9; }
        
        /* Botones de Acción Minimalistas */
        .actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon { 
            width: 32px; height: 32px; border-radius: 8px; border: none; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; background: #f0f0f0; 
        }
        .btn-edit { color: #210DAA; } /* Tu azul de marca */
        .btn-edit:hover { background: #e8e8ff; }
        .btn-delete { color: var(--danger); }
        .btn-delete:hover { background: #fff0f0; }

        /* Custom Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }

        /* Switches y Form */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .btn-save { background: var(--sidebar); color: var(--accent); padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-bottom:10px;">¿Eliminar plato?</h3>
            <p style="font-size:0.9rem; color:#666;">Esta acción no se puede deshacer.</p>
            <div class="modal-btns">
                <button class="btn-modal" onclick="closeModal()" style="background:#eee;">Cancelar</button>
                <button id="confirm-delete-btn" class="btn-modal" style="background:var(--danger); color:white;">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="letter-spacing: 3px;">IKU ADMIN</h1>
            <button id="login-btn" style="background:#11141a; color:#ffcc00; padding:12px 30px; border:none; border-radius:8px; cursor:pointer; margin-top:20px; font-weight:bold;">INGRESAR</button>
        </div>
    </div>

    <div id="admin-panel">
        <aside class="sidebar">
            <h2>IKU</h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">🔔 Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)">🍔 Inventario</div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)">📊 Estadísticas</div>
            <div style="margin-top:auto; padding:20px;"><button onclick="auth.signOut()" style="color:#ff4444; background:none; border:none; cursor:pointer; font-weight:bold;">Cerrar Sesión</button></div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <h3>Pedidos del Día</h3>
                <div id="l-pendientes" style="margin-top:20px;"></div>
            </section>

            <section id="v-menu" class="view-section">
                <div class="card">
                    <h3 id="f-title">Añadir Nuevo Plato</h3>
                    <form id="m-form">
                        <input type="hidden" id="edit-id">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                            <input type="text" id="name" placeholder="Nombre del Plato" required>
                            <input type="number" id="price" placeholder="Precio ($)" required>
                            <select id="category">
                                <option value="diario">Menú del Día</option>
                                <option value="rapida">Comidas Rápidas</option>
                                <option value="varios">Varios</option>
                            </select>
                            <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                        </div>
                        <textarea id="desc" placeholder="Descripción breve para el comensal..."></textarea>
                        <button type="submit" id="s-btn" class="btn-save">GUARDAR EN LA CARTA</button>
                        <button type="button" id="close-x" onclick="cancelarEdicion()" style="display:none; color:red; margin-top:10px; background:none; border:none; cursor:pointer; width:100%;">Cancelar Edición</button>
                    </form>
                </div>
                
                <div id="inv-list">
                    </div>
            </section>

            <section id="v-stats" class="view-section">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="card" style="background:var(--sidebar); color:var(--accent);">
                        <p style="font-size:0.8rem; opacity:0.8;">Ventas Hoy</p><h2 id="s-hoy">$0</h2>
                    </div>
                    <div class="card" style="background:var(--success); color:white;">
                        <p style="font-size:0.8rem; opacity:0.8;">Ventas Mes</p><h2 id="s-mes">$0</h2>
                    </div>
                </div>
                <div class="card">
                    <h3>Historial Mensual</h3>
                    <div id="historial-meses"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleSeccion(header) {
            header.parentElement.classList.toggle('collapsed');
        }
        function closeModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }
    </script>
</body>
</html>
