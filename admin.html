<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #0f1115; --accent: #ffcc00; --bg: #f8fafc; --white: #ffffff; --success: #22c55e; --danger: #ef4444; --text: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; color: var(--text); }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 40px; letter-spacing: 3px; font-weight: 700; }
        .nav-item { padding: 16px 28px; cursor: pointer; color: #94a3b8; transition: 0.3s; border-left: 4px solid transparent; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: #1e293b; color: white; border-left-color: var(--accent); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        /* Tarjetas */
        .card { background: var(--white); border-radius: 16px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        h3 { margin-bottom: 25px; font-weight: 600; color: var(--sidebar); display: flex; align-items: center; gap: 10px; }

        /* Acordeón de Inventario */
        .admin-group { margin-bottom: 15px; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .admin-group-header { 
            background: #ffffff; padding: 15px 20px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s; user-select: none;
        }
        .admin-group-header:hover { background: #f8fafc; }
        .admin-group-header h4 { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .admin-group-content { max-height: 2000px; transition: max-height 0.4s ease-in-out; background: white; }
        .admin-group.collapsed .admin-group-content { max-height: 0; overflow: hidden; }
        .admin-group.collapsed .chevron { transform: rotate(-90deg); }
        .chevron { transition: transform 0.3s; font-size: 0.8rem; }

        /* Filas de Platos */
        .admin-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px 20px; border-top: 1px solid #f1f5f9;
        }
        .admin-row:first-child { border-top: none; }
        .dish-info { display: flex; flex-direction: column; }
        .dish-info strong { font-size: 0.95rem; color: #1e293b; }
        .dish-info span { font-size: 0.85rem; color: var(--success); font-weight: 600; }

        /* Botones de Acción (Mejorados) */
        .actions { display: flex; gap: 8px; align-items: center; }
        .btn-action { 
            width: 36px; height: 36px; border-radius: 10px; border: none; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn-edit { background: #eff6ff; color: #2563eb; }
        .btn-edit:hover { background: #dbeafe; }
        .btn-delete { background: #fef2f2; color: #dc2626; }
        .btn-delete:hover { background: #fee2e2; }

        /* Switches */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e1; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Formulario Grid */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--accent); }
        textarea { grid-column: span 2; height: 100px; resize: none; }
        .btn-save { grid-column: span 2; background: var(--sidebar); color: var(--accent); padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* Estadísticas */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; border-bottom: 5px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .stat-card p { font-size: 0.8rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card h2 { font-size: 1.8rem; color: var(--sidebar); }

        #login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; padding: 50px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="letter-spacing: 4px; margin-bottom: 10px;">IKU</h1>
            <p style="color:#64748b; font-size: 0.9rem; margin-bottom: 30px;">Panel de Administración</p>
            <button id="login-btn" style="background:var(--sidebar); color:var(--accent); width:100%; padding:14px; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">ACCEDER</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <aside class="sidebar">
            <h2>IKU</h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)"><span>🔔</span> Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)"><span>🍔</span> Inventario</div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)"><span>📊</span> Estadísticas</div>
            <div style="margin-top:auto; padding:20px; border-top: 1px solid #1e293b;">
                <button onclick="auth.signOut()" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:600; font-size: 0.85rem;">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <h3>🔔 Comandas Activas</h3>
                <div id="l-pendientes"></div>
            </section>

            <section id="v-menu" class="view-section">
                <div class="card">
                    <h3 id="f-title">➕ Gestionar Carta</h3>
                    <form id="m-form" class="form-grid">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="name" placeholder="Nombre del Plato" required>
                        <input type="number" id="price" placeholder="Precio ($)" required>
                        <select id="category">
                            <option value="diario">📅 Menú del Día</option>
                            <option value="rapida">🍔 Comidas Rápidas</option>
                            <option value="varios">✨ Varios</option>
                        </select>
                        <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                        <textarea id="desc" placeholder="Descripción breve para el comensal..."></textarea>
                        <button type="submit" id="s-btn" class="btn-save">GUARDAR EN LA CARTA</button>
                        <button type="button" id="close-x" onclick="cancelarEdicion()" style="display:none; color:var(--danger); grid-column:span 2; background:none; border:none; cursor:pointer; font-size: 0.8rem; margin-top: 10px;">Cancelar Edición</button>
                    </form>
                </div>
                
                <div id="inv-list">
                    </div>
            </section>

            <section id="v-stats" class="view-section">
                <div class="stats-grid">
                    <div class="stat-card"><p>Ventas de Hoy</p><h2 id="s-hoy">$0</h2></div>
                    <div class="stat-card"><p>Ventas del Mes</p><h2 id="s-mes">$0</h2></div>
                </div>

                <div class="card">
                    <h3>🏆 Más Vendidos por Sección</h3>
                    <div id="rankings-categoria" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;"></div>
                </div>

                <div class="card">
                    <h3>📅 Historial de Ventas</h3>
                    <table style="width:100%; border-collapse: collapse;">
                        <thead style="text-align:left; color:#94a3b8; font-size: 0.75rem;">
                            <tr><th style="padding:10px;">MES / AÑO</th><th style="padding:10px;">TOTAL</th><th style="padding:10px;">PLATO ESTRELLA</th></tr>
                        </thead>
                        <tbody id="historial-meses"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        // Función para colapsar secciones
        function toggleSeccion(header) {
            header.parentElement.classList.toggle('collapsed');
        }
    </script>
</body>
</html>
