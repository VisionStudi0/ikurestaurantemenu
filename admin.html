<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #0f1115; --accent: #ffcc00; --bg: #f8fafc; --white: #ffffff; --success: #22c55e; --danger: #ef4444; --text: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        .sidebar { width: 260px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; z-index: 100; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 40px; letter-spacing: 4px; }
        .nav-item { padding: 16px 28px; cursor: pointer; color: #94a3b8; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item.active { background: #1e293b; color: white; border-left-color: var(--accent); }
        .main-content { flex: 1; height: 100vh; overflow-y: auto; padding: 30px; }
        .view-section { display: none; width: 100%; max-width: 900px; margin: 0 auto; }
        .view-section.active { display: block; }
        .pedido-card { background: white; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-nota { font-size: 0.75rem; color: var(--danger); background: #fff5f5; padding: 4px 8px; border-radius: 5px; display: block; margin-top: 5px; font-weight: 600; }
        .admin-group { margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 10px; background: white; }
        .admin-group-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .admin-group-content { display: none; padding: 0 15px 15px; }
        .admin-group.open .admin-group-content { display: block; }
        .admin-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #f1f5f9; }
        .btn-icon { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; background: #f8fafc; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 300px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .btn-save { background: var(--sidebar); color: var(--accent); padding: 15px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .stat-card { padding: 20px; border-radius: 15px; }
        #login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="modal-title">¿Confirmar?</h3>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#eee;">No</button>
                <button id="confirm-delete-btn" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--danger); color:white;">Sí</button>
            </div>
        </div>
    </div>

    <div id="login-screen">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center;">
            <h1>IKU</h1>
            <button id="login-btn" style="background:#000; color:#fc0; padding:12px 30px; border:none; border-radius:10px; margin-top:20px; cursor:pointer; font-weight:700;">INGRESAR</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none;">
        <aside class="sidebar">
            <h2>IKU</h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">🔔 Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)">🍔 Inventario</div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)">📊 Estadísticas</div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <div id="l-pendientes"></div>
                <div style="margin-top:40px; border-top: 1px dashed #ccc; padding-top: 20px;">
                    <h4 style="font-size:0.7rem; color:#999; margin-bottom:10px;">HISTORIAL HOY</h4>
                    <div id="l-atendidos"></div>
                </div>
            </section>

            <section id="v-menu" class="view-section">
                <div style="background:white; padding:25px; border-radius:15px; margin-bottom:20px;">
                    <h3 id="f-title" style="margin-bottom:15px;">➕ Gestionar Carta</h3>
                    <form id="m-form">
                        <input type="hidden" id="edit-id">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <input type="text" id="name" placeholder="Nombre plato" required>
                            <input type="number" id="price" placeholder="Precio" required>
                        </div>
                        <select id="category">
                            <option value="diario">Menú del Día</option>
                            <option value="rapida">Comidas Rápidas</option>
                            <option value="varios">Varios</option>
                        </select>
                        <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                        <textarea id="desc" placeholder="Descripción corta..."></textarea>
                        <div style="display:flex; gap:10px;">
                            <button type="submit" class="btn-save" style="flex:2;">GUARDAR</button>
                            <button type="button" onclick="cancelarEdicion()" style="flex:1; border-radius:10px; border:none; background:#eee;">Cancelar</button>
                        </div>
                    </form>
                </div>
                <div id="inv-list"></div>
            </section>

            <section id="v-stats" class="view-section">
                <div class="stats-grid">
                    <div class="stat-card" style="background:#0f1115; color:#fc0;"><p>HOY</p><h2 id="s-hoy">$0</h2></div>
                    <div class="stat-card" style="background:#22c55e; color:white;"><p>MES</p><h2 id="s-mes">$0</h2></div>
                </div>
                <div id="rankings-categoria" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:20px;"></div>
                <div style="background:white; padding:20px; border-radius:15px;">
                    <h4 style="margin-bottom:15px; font-size:0.9rem;">🛒 Top Ingredientes (Para comprar)</h4>
                    <div id="rankings-ingredientes" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleSeccion(header) { header.parentElement.classList.toggle('open'); }
        function closeModal() { document.getElementById('delete-modal').style.display = 'none'; }
    </script>
</body>
</html>
