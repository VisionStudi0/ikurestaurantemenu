<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IKU | Pueblo Bello</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #ffcc00; --danger: #dc3545; }
        body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; max-width: 700px; margin: auto; }
        h2, h3 { text-align: center; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save { background: var(--accent); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 6px; }
        
        /* Secciones de Pedidos */
        #seccion-pedidos { background: #fff5d7; padding: 20px; border-radius: 10px; margin-bottom: 30px; border: 2px solid var(--accent); }
        .pedido-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 8px solid #28a745; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Listas de Platos */
        .category-title { background: var(--primary); color: var(--accent); padding: 8px 15px; border-radius: 4px; margin: 20px 0 10px; font-size: 0.8rem; text-transform: uppercase; }
        .plato-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-action { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        
        #login-screen { text-align: center; padding: 50px 0; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-screen">
            <h1>IKU ADMIN</h1>
            <p>Pueblo Bello, Cesar</p>
            <button id="login-btn" style="padding:15px; background:#4285F4; color:white; border:none; width:100%; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:20px;">ENTRAR CON GOOGLE</button>
        </div>

        <div id="admin-panel">
            
            <div id="seccion-pedidos">
                <h3>🔔 PEDIDOS EN VIVO</h3>
                <div id="lista-pedidos-realtime">
                    <p style="text-align:center; color:#888;">Esperando pedidos...</p>
                </div>
            </div>

            <hr>

            <h3 id="form-title" style="margin-top:30px;">Publicar Nuevo Plato</h3>
            <form id="menu-form">
                <input type="hidden" id="edit-id">
                <input type="text" id="name" placeholder="Nombre del plato" required>
                <input type="number" id="price" placeholder="Precio (ej: 25000)" required>
                <select id="category">
                    <option value="diario">Menú del Día</option>
                    <option value="rapida">Comidas Rápidas</option>
                    <option value="varios">Varios</option>
                </select>
                <textarea id="desc" placeholder="Descripción corta..."></textarea>
                <input type="text" id="ingredients" placeholder="Ingredientes (separados por coma)">
                
                <button type="submit" id="submit-btn" class="btn-save">PUBLICAR PLATO</button>
                <button type="button" id="cancel-edit" style="display:none; width:100%; margin-top:10px; background:#ccc; border:none; padding:10px; border-radius:6px; cursor:pointer;" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
            </form>

            <h3 style="margin-top:40px;">Platos en el Menú</h3>
            
            <div class="category-title">Menú del Día</div>
            <div id="lista-diario"></div>

            <div class="category-title">Comidas Rápidas</div>
            <div id="lista-rapida"></div>

            <div class="category-title">Varios</div>
            <div id="lista-varios"></div>

            <button onclick="auth.signOut()" style="margin-top:50px; width:100%; background:none; border:none; color:red; cursor:pointer; text-decoration:underline;">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module" src="admin-script.js"></script>
</body>
</html>
