<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="overflow: hidden;">
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="delete-modal" class="modal-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5000;">
        <div class="modal-card" style="background: white; padding: 30px; border-radius: 20px; text-align: center;">
            <h3 id="modal-title">¿Confirmar?</h3>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:10px; border:none; background:#eee;">No</button>
                <button id="confirm-delete-btn" style="flex:1; padding:10px; border-radius:10px; border:none; background:#ef4444; color:white;">Sí</button>
            </div>
        </div>
    </div>

    <div id="login-screen" style="position: fixed; inset: 0; background: #0f1115; display: flex; align-items: center; justify-content: center; z-index: 2000;">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center;">
            <h1>IKU ADMIN</h1>
            <button id="login-btn" style="background:#000; color:#ffcc00; padding:12px 30px; border:none; border-radius:10px; margin-top:20px; cursor:pointer;">INGRESAR</button>
        </div>
    </div>

    <div id="admin-panel" style="display: none; width: 100vw; height: 100vh; background: #f8fafc;">
        <aside class="sidebar" style="width: 260px; background: #0f1115; color: white; display: flex; flex-direction: column; padding: 20px 0;">
            <h2 style="color:#ffcc00; text-align:center; margin-bottom:40px;">IKU</h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)" style="padding: 15px 30px; cursor: pointer;">🔔 Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)" style="padding: 15px 30px; cursor: pointer;">🍔 Inventario</div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)" style="padding: 15px 30px; cursor: pointer;">📊 Estadísticas</div>
        </aside>

        <main class="main-content" style="flex: 1; height: 100vh; overflow-y: auto; padding: 40px;">
            <section id="v-pedidos" class="view-section active">
                <div id="l-pendientes"></div>
                <div class="admin-group" id="g-despachados" style="margin-top:40px;">
                    <div class="admin-group-header" onclick="toggleSeccion(this)" style="padding: 15px; cursor: pointer; border: 1px dashed #ccc;">
                        <h4 style="color:#94a3b8; margin:0;">✅ DESPACHADOS (HOY)</h4>
                    </div>
                    <div class="admin-group-content"><div id="l-atendidos"></div></div>
                </div>
            </section>

            <section id="v-menu" class="view-section">
                <div style="background:white; padding:30px; border-radius:20px; margin-bottom:30px;">
                    <h3 id="f-title">➕ Gestionar Carta</h3>
                    <form id="m-form" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="name" placeholder="Nombre" required>
                        <input type="number" id="price" placeholder="Precio ($)" required>
                        <select id="category"><option value="diario">Menú del Día</option><option value="rapida">Comidas Rápidas</option><option value="varios">Varios</option></select>
                        <input type="number" id="stock" placeholder="Stock Inicial" required>
                        <textarea id="desc" placeholder="Descripción..." style="grid-column: span 2;"></textarea>
                        <input type="text" id="ingredients" placeholder="Ingredientes (con coma)" style="grid-column: span 2;">
                        <button type="submit" class="btn-save" style="grid-column: span 2; background:#000; color:#fc0; padding:15px; border:none; border-radius:10px; cursor:pointer;">GUARDAR</button>
                    </form>
                </div>
                <div id="inv-list"></div>
            </section>

            <section id="v-stats" class="view-section">
                <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="stat-card" style="background:#0f1115; color:#fc0; padding:30px; border-radius:15px;">HOY<h2 id="s-hoy">$0</h2></div>
                    <div class="stat-card" style="background:#22c55e; color:white; padding:30px; border-radius:15px;">MES<h2 id="s-mes">$0</h2></div>
                </div>
                <div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px;">
                    <h4>🧾 Cierre por Métodos</h4>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <div style="flex:1; background:#f8fafc; padding:10px; border-radius:10px;">🟣 Nequi: <strong id="s-nequi">$0</strong></div>
                        <div style="flex:1; background:#f8fafc; padding:10px; border-radius:10px;">🟡 Banc.: <strong id="s-bancolombia">$0</strong></div>
                        <div style="flex:1; background:#f8fafc; padding:10px; border-radius:10px;">💵 Efec.: <strong id="s-efectivo">$0</strong></div>
                    </div>
                </div>
                <div id="rankings-categoria" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:20px;"></div>
                <div id="rankings-ingredientes" style="display:flex; flex-wrap:wrap; gap:10px; background:white; padding:20px; border-radius:15px;"></div>
                <button id="btn-reset-stats" onclick="triggerResetStats()" style="display:none; width:100%; margin-top:20px; padding:15px; border:2px dashed #ef4444; color:#ef4444; background:none; cursor:pointer;">⚠️ CERRAR CAJA (Reiniciar Todo)</button>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleSeccion(header) { header.parentElement.classList.toggle('open'); }
        function closeModal() { document.getElementById('delete-modal').style.display = 'none'; }
    </script>
</body>
</html>
