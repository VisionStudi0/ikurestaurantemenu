<main class="main-content">
    <section id="v-pedidos" class="view-section active">
        <div class="bento-grid-pedidos">
            <div class="card-bento column-pendientes">
                <h3 class="card-title">Pendientes <span class="badge-count" id="count-pendientes">0</span></h3>
                <div id="l-pendientes"></div>
            </div>
            <div class="card-bento column-atendidos">
                <div class="admin-group-header" onclick="toggleAtendidos()">
                    <h3 class="card-title">Atendidos Hoy</h3>
                    <svg id="chevron-atendidos" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div id="l-atendidos" class="lista-atendidos-oculta"></div>
            </div>
        </div>
    </section>

    <section id="v-stats" class="view-section">
        <div class="dashboard-header">
            <h2>Estadísticas</h2>
            <select id="periodo-selector" onchange="actualizarMétricas()">
                <option value="hoy">Cierre de Hoy</option>
                <option value="semana">Últimos 7 días</option>
                <option value="mes">Mes en curso</option>
            </select>
        </div>

        <div class="bento-grid-stats">
            <div class="card-bento card-yellow">
                <p class="card-label">Ventas Totales</p>
                <h2 id="s-hoy" class="big-number">$0</h2>
                <div class="mini-chart-placeholder">
                    <span id="s-pedidos-total">0</span> pedidos realizados
                </div>
            </div>

            <div class="card-bento card-dark">
                <p class="card-label">Ventas del Mes</p>
                <h2 id="s-mes" class="big-number-small">$0</h2>
                <p class="card-sub">Crecimiento proyectado</p>
            </div>

            <div class="card-bento card-white">
                <p class="card-label">Métodos de Pago</p>
                <div class="payment-list">
                    <div class="payment-item"><span>Nequi</span> <strong id="s-nequi">$0</strong></div>
                    <div class="payment-item"><span>Banco</span> <strong id="s-bancolombia">$0</strong></div>
                    <div class="payment-item"><span>Efectivo</span> <strong id="s-efectivo">$0</strong></div>
                </div>
            </div>

            <div class="card-bento card-dark">
                <p class="card-label">Inventario Crítico</p>
                <div id="rankings-ingredientes" class="tags-container">
                    </div>
            </div>

            <div class="card-bento card-dark span-2">
                <p class="card-label">Top 5 Platos más vendidos</p>
                <div id="rankings-categoria" class="rankings-list"></div>
            </div>

            <div class="card-bento card-danger">
                <p class="card-label">Pérdidas (Rechazos)</p>
                <div id="rankings-rechazados"></div>
            </div>
        </div>
    </section>

    </main>
