<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>Acceso Seguro</h2>
            <button id="login-btn" class="btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Entrar con Google
            </button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <aside class="sidebar">
            <h2>IKU<span>.</span></h2>
            <div class="nav-item active" onclick="window.cambiarVista('v-pedidos', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Pedidos</span>
            </div>
            <div class="nav-item" onclick="window.cambiarVista('v-carta', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Carta</span>
            </div>
            <div class="nav-item" onclick="window.cambiarVista('v-mesas', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                <span>Mesas</span>
            </div>
            <div class="nav-item" onclick="window.cambiarVista('v-stats', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Métricas</span>
            </div>
            <div class="logout-wrapper">
                <div class="nav-item" onclick="window.logout()" style="color: var(--danger);">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Salir</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <div class="orders-grid">
                    <div class="orders-column">
                        <h3>Pendientes</h3>
                        <div id="l-activos"></div>
                    </div>
                    <div class="orders-column">
                        <div class="admin-group">
                            <div class="admin-group-header" onclick="toggleAtendidos()">
                                <span>Atendidos Hoy</span>
                                <svg id="chevron-atendidos" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div id="l-atendidos" class="lista-atendidos-oculta"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-carta" class="view-section">
                <div class="carta-layout">
                    <div class="carta-list-container">
                        <h3>Menú Activo</h3>
                        <div id="inv-list"></div>
                    </div>
                    <div class="carta-form-container">
                        <div class="form-card">
                            <h3>Configurar Plato</h3>
                            <div class="form-group">
                                <input type="hidden" id="edit-id"> 
                                <input type="text" id="p-nombre" placeholder="Nombre del plato">
                                <div class="form-row">
                                    <input type="number" id="p-precio" placeholder="Precio">
                                    <select id="p-categoria">
                                        <option value="diario">Menú del Día</option>
                                        <option value="desayuno">Desayunos</option>
                                        <option value="especial">Especiales</option>
                                        <option value="asado">Asados</option>
                                        <option value="rapida">Comida Rápida</option>
                                        <option value="bebida">Bebidas</option>
                                    </select>
                                </div>
                                <textarea id="p-desc" placeholder="Descripción breve"></textarea>
                                <button onclick="window.guardarPlato()" class="btn-primary">Guardar Plato</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-mesas" class="view-section">
                <h3>Plano de Mesas</h3>
                <div id="grid-mesas" class="mesas-container"></div>
            </section>

            <section id="v-stats" class="view-section">
                <h3>Resumen Financiero</h3>
                <div class="stats-grid">
                    <div class="stat-card"><span>Ventas Hoy</span><strong id="s-hoy">$0</strong></div>
                    <div class="stat-card"><span>Ventas Mes</span><strong id="s-mes">$0</strong></div>
                    <div class="stat-card"><span>Ticket Promedio</span><strong id="s-ticket-promedio">$0</strong></div>
                </div>

                <div class="stats-methods-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div class="stat-card">
                        <h4>Pagos por Método (Hoy)</h4>
                        <p>Nequi: <b id="s-nequi">$0</b></p>
                        <p>Banco: <b id="s-bancolombia">$0</b></p>
                        <p>Efectivo: <b id="s-efectivo">$0</b></p>
                    </div>
                    <div class="stat-card">
                        <h4>Top Platos Hoy</h4>
                        <div id="rankings-categoria"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="delete-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>¿Confirmar acción?</h3>
            <div class="modal-buttons">
                <button onclick="closeModal()" class="btn-outline">Cancelar</button>
                <button id="confirm-delete-btn" class="btn-danger">Confirmar</button>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" preload="auto"></audio>

    <script type="module" src="admin-script.js"></script>
    <script>
        window.cambiarVista = function(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        function toggleAtendidos() {
            const l = document.getElementById('l-atendidos');
            const c = document.getElementById('chevron-atendidos');
            l.classList.toggle('lista-atendidos-oculta');
            c.style.transform = l.classList.contains('lista-atendidos-oculta') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function closeModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }
    </script>
</body>
</html>
